<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Page</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background-color: #111;
  color: #fff;
}

nav {
  background-color: #000;
  padding: 15px 30px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

nav a {
  color: #ff4d4d;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: #fff;
}

header {
  background-color: #220000;
  text-align: center;
  padding: 60px 20px;
  color: #ff4d4d;
}

header h1 {
  font-size: 50px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

section {
  max-width: 1100px;
  margin: 50px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

.media-link {
  text-decoration: none;
}

.media-card {
  background-color: #222;
  border-radius: 10px;
  transition: transform 0.3s, background-color 0.3s;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.media-card:hover {
  background-color: #440000;
  cursor: pointer;
}

.media-card img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  margin: 10px auto;
}


.media-card-content {
  padding: 20px;
  flex: 1;
}

.media-card h2 {
  margin: 0 0 10px 0;
  color: #ff4d4d;
  font-family: Georgia, serif;
  font-size: 24px;
}

.media-card p {
  font-family: Tahoma, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  color: #fff;
}

footer {
  background-color: #000;
  text-align: center;
  padding: 25px;
  color: #ff4d4d;
  font-family: Georgia, serif;
}
</style>
</head>
